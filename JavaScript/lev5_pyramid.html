<!DOCTYPE html>
<html>
<body>

<script>
let levels = 5;

for (let i = 1; i <= levels; i++) {
    for (let space = 1; space <= levels - i; space++) {
        document.write("&nbsp;&nbsp;");
    }
    for (let star = 1; star <= (2 * i - 1); star++) {
        document.write("* ");
    }
    document.write("<br>");
}
</script>

</body>
</html>
