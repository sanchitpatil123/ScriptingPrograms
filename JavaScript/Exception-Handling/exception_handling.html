<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exception Handling Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 8px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Exception handling by Abhishek </h2>

    <input type="number" id="num1" placeholder="Enter Numerator">
    <input type="number" id="num2" placeholder="Enter Denominator">

    <br><br>
    <button onclick="divideNumbers()">Divide</button>

    <div id="result"></div>
</div>

<script>
    function divideNumbers() {
        let resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "";

        try {
            let a = Number(document.getElementById("num1").value);
            let b = Number(document.getElementById("num2").value);

            if (b === 0) {
                throw new Error("Denominator cannot be zero");
            }

            let result = a / b;
            resultDiv.style.color = "green";
            resultDiv.innerHTML = "Result: " + result;

        } catch (error) {
            resultDiv.style.color = "red";
            resultDiv.innerHTML = "Error: " + error.message;

        } finally {
            console.log("Division operation completed");
        }
    }
</script>

</body>
</html>
