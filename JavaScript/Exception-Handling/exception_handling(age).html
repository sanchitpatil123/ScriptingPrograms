<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Age Validation using Exception Handling</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            padding: 8px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Age Validation</h2>

    <input type="number" id="age" placeholder="Enter your age">
    <br><br>
    <button onclick="checkAge()">Submit</button>

    <div id="message"></div>
</div>

<script>
    function checkAge() {
        let msg = document.getElementById("message");
        msg.innerHTML = "";

        try {
            let age = Number(document.getElementById("age").value);

            if (age < 18) {
                throw new Error("Age must be 18 or above.");
            }

            msg.style.color = "green";
            msg.innerHTML = "Access granted to Abhishek . your Age is valid.";

        } catch (error) {
            msg.style.color = "red";
            msg.innerHTML = "Error: " + error.message;

        } finally {
            console.log("Age validation completed.");
        }
    }
</script>

</body>
</html>
