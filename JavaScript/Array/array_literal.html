!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width="250", initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Creating array using array literal
let fruits = A
// Display whole array
for (let i = 0; i < fruits.length; i++) {
  console.log("Index " + i + ": " + fruits[i]);
}

// Accessing elements
console.log("First fruit:", fruits[0]);
console.log("Last fruit:", fruits[fruits.length - 1]);

// Add a new element
fruits.push("Grapes");
for (let i = 0; i < fruits.length; i++) {
  console.log("Index " + i + ": " + fruits[i]);
}
//Add the element at beginning
fruits.unshift("Pineapple");
for (let i = 0; i < fruits.length; i++) {
  console.log("Index " + i + ": " + fruits[i]);
}

fruits.splice(2, 0, "Kiwi");  
// 2 = index, 0 = remove none, "Kiwi" = new element
for (let i = 0; i < fruits.length; i++) {
  console.log("Index " + i + ": " + fruits[i]);
}
//Remove the last element
fruits.pop();
for (let i = 0; i < fruits.length; i++) {
  console.log("Index " + i + ": " + fruits[i]);
}
//Remove the first element
fruits.shift();
for (let i = 0; i < fruits.length; i++) {
  console.log("Index " + i + ": " + fruits[i]);
}
fruits.splice(2, 1);  
// 2 = index, 1 = remove 1 element
for (let i = 0; i < fruits.length; i++) {
  console.log("Index " + i + ": " + fruits[i]);
}
// Display all elements using loop
console.log("All fruits in the array:");
for (let i = 0; i < fruits.length; i++) {
  console.log(fruits[i]);
}
</script>

    
</body>
</html>
